name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    container:
      image: fedora:43

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: dnf install -y --setopt=install_weak_deps=False actionlint shellcheck rpmlint rpm-build make

      - name: Check (shellcheck + TOML + actionlint)
        run: make check

      - name: Build RPM
        run: make rpm

      - name: rpmlint
        run: make lint
