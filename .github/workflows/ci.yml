name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Validate (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [devbox]
        # Add new variants to this list as they land. Keep ordering stable for
        # deterministic CI run ordering.

    container:
      image: fedora:43

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Compute cache week
        id: week
        run: echo "key=$(date +%Y-%W)" >> "$GITHUB_OUTPUT"

      - name: Cache dnf packages
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: dnf-f43-${{ steps.week.outputs.key }}-${{ hashFiles('.github/workflows/ci.yml', 'variants/*/blueprint.toml', 'variants/*/*-firstboot/SPECS/*.spec') }}
          restore-keys: |
            dnf-f43-${{ steps.week.outputs.key }}-
            dnf-f43-

      - name: Install build deps
        run: dnf install -y --setopt=install_weak_deps=False --setopt=keepcache=True golang shellcheck rpmlint rpm-build systemd-rpm-macros git make yq python3-pip systemd

      - name: Install actionlint
        run: GOBIN=/usr/local/bin go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Install check-jsonschema
        run: pip install --break-system-packages check-jsonschema

      - name: Check (shellcheck + TOML + actionlint + check-versions + check-settings)
        run: make VARIANT=${{ matrix.variant }} check

      - name: Build RPM
        run: make VARIANT=${{ matrix.variant }} rpm

      - name: rpmlint
        run: make VARIANT=${{ matrix.variant }} lint

      - name: systemd-analyze security (advisory)
        # Advisory-only: prints exposure score for the firstboot unit.
        # Does not fail the build — hardening is constrained by sudo/Ruby/dnf needs.
        # --offline=true scores the file directly without loading it as a unit.
        continue-on-error: true
        run: |
          unit=$(find variants/${{ matrix.variant }} -name '*.service' | head -1)
          if [ -n "$unit" ]; then
            systemd-analyze security --offline=true --no-pager "$unit" || true
          else
            echo "no .service unit found in variants/${{ matrix.variant }}"
          fi

  fleet-version-check:
    name: Fleet check-versions-all
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install minimal deps
        run: dnf install -y --setopt=install_weak_deps=False make yq
      - name: check-versions-all
        run: make check-versions-all
