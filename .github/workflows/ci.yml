name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    container:
      image: fedora:43

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Compute cache week
        id: week
        run: echo "key=$(date +%Y-%W)" >> "$GITHUB_OUTPUT"

      - name: Cache dnf packages
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: dnf-f43-${{ steps.week.outputs.key }}-${{ hashFiles('.github/workflows/ci.yml', 'blueprint.toml', 'bastion-vm-firstboot/SPECS/*.spec') }}
          restore-keys: |
            dnf-f43-${{ steps.week.outputs.key }}-
            dnf-f43-

      - name: Install build deps
        run: dnf install -y --setopt=install_weak_deps=False --setopt=keepcache=True golang shellcheck rpmlint rpm-build systemd-rpm-macros git make yq python3-pip

      - name: Install actionlint
        run: GOBIN=/usr/local/bin go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Install check-jsonschema
        run: pip install --break-system-packages check-jsonschema

      - name: Check (shellcheck + TOML + actionlint)
        run: make check

      - name: Build RPM
        run: make rpm

      - name: rpmlint
        run: make lint
