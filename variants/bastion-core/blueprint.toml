name = "fedora-43-bastion-core"
description = "Fedora 43 minimal + Bastion C2 server stack (Tier 1+2 operator control plane)"
version = "0.1.2"
distro = "fedora-43"

# Bastion core VM: Fedora 43 minimal runtime hosting the full Bastion server
# stack — Node.js C2 server, React web UI, and all ten Go sidecars.
#
# All Bastion packages (bastion-core + ten sidecars + firstboot) come from
# operator-supplied RPMs dropped into variants/bastion-core/extra-rpms/ before
# running `make VARIANT=bastion-core image`. See README.md for build order.
#
# Nested KVM: the VM must be booted with `-cpu host,+vmx` (Intel) or
# `-cpu host,+svm` (AMD) by the outer QEMU process on the host so that
# bastion-qemu can provision TheatreManager VMs inside this VM using KVM.
# This is a host-side launch flag — not configurable in the blueprint.
packages = [
    # --- minimal runtime ---
    { name = "systemd",                version = "*" },
    { name = "openssh-server",         version = "*" },
    { name = "sudo",                   version = "*" },
    { name = "ca-certificates",        version = "*" },
    { name = "glibc-minimal-langpack", version = "*" },
    # NetworkManager: DHCP client daemon for virtio NIC — required for SLIRP
    # network (QEMU usermode) to assign 10.0.2.15 and for SSH hostfwd to work.
    { name = "NetworkManager",         version = "*" },
    # cloud-init: firstboot reads NoCloud meta-data for per-VM identity
    { name = "cloud-init",             version = "*" },
    # audit: AVC denial visibility
    { name = "audit",                  version = "*" },
    # dnf5-automatic: security-only updates
    { name = "dnf5-plugin-automatic",  version = "*" },

    # --- bastion-core server runtime dependencies ---
    # bastion-core.spec Requires: nodejs >= 22, openssl-libs, systemd
    { name = "nodejs",                 version = "*" },
    { name = "openssl",                version = "*" },

    # --- nested VM hosting (bastion-qemu provisions TheatreManager VMs) ---
    # qemu-kvm: QEMU with KVM accelerator for VM provisioning inside this VM.
    # Host must boot this VM with `-cpu host,+vmx` (or +svm on AMD) for nested
    # KVM to function. bastion-qemu uses CAP_NET_ADMIN + TAP interfaces
    # directly — libvirt is not required.
    { name = "qemu-kvm",               version = "*" },
    # nftables: VM-to-VM isolation rules applied by bastion-qemu at startup
    { name = "nftables",               version = "*" },
    # iproute: `ip` command for bridge and TAP interface management
    { name = "iproute",                version = "*" },
    # bridge-utils: `brctl` used by bastion-qemu bridge setup
    { name = "bridge-utils",           version = "*" },

    # --- Bastion C2 server packages (operator-supplied via extra-rpms/) ---
    # Build order: see scripts/build-extra-rpms.sh
    { name = "bastion-core",                       version = "*" },
    { name = "bastion-credential-keystore",        version = "*" },
    { name = "bastion-ssh",                        version = "*" },
    { name = "bastion-pack-loader",                version = "*" },
    { name = "bastion-pki-trust",                  version = "*" },
    { name = "bastion-adcon-engine",               version = "*" },
    { name = "bastion-qemu",                       version = "*" },
    { name = "bastion-adcon-mirror",               version = "*" },
    { name = "bastion-ironlaw-loader",             version = "*" },
    { name = "bastion-mfa",                        version = "*" },
    { name = "bastion-intent-ledger-replicator",   version = "*" },

    # --- firstboot (built by this variant) ---
    { name = "bastion-core-firstboot",  version = "*" },
]

[customizations]
hostname = "bastion-core"

[[customizations.user]]
name = "bastion-operator"
key = "ssh-ed25519 CHANGEME user@localhost"
groups = ["wheel"]

[customizations.services]
enabled = [
    "sshd",
    # Firstboot runs before bastion-core — rolls PKI to generate per-VM SAI.
    # The bastion-core-firstboot RPM installs a systemd drop-in on bastion-core
    # that adds After=bastion-core-firstboot.service ordering.
    "bastion-core-firstboot",
    # C2 server tier
    "bastion-core",
    "bastion-web",
    # Sidecars
    "bastion-credential-keystore",
    "bastion-ssh",
    "bastion-pack-loader",
    "bastion-pki-trust",
    "bastion-adcon-engine",
    "bastion-qemu",
    "bastion-adcon-mirror",
    "bastion-ironlaw-loader",
    "bastion-mfa",
    "bastion-intent-ledger-replicator",
    # Housekeeping
    "dnf5-automatic.timer",
    "auditd.service",
]
disabled = ["initial-setup"]

[customizations.locale]
languages = ["en_US.UTF-8"]
keyboard = "us"

[customizations.timezone]
timezone = "UTC"

[customizations.kernel]
append = "console=ttyS0,115200 console=tty0"

# 40 GiB root: Node.js dist (~500 MiB) + Go binaries (~150 MiB) + VM images
# stored under /var/lib/bastion/qemu/ + service state + log headroom.
[[customizations.filesystem]]
mountpoint = "/"
minsize = 42949672960

# Harden SSHD: key-only auth, no root login, no X11.
[[customizations.files]]
path = "/etc/ssh/sshd_config.d/99-hardening.conf"
mode = "0644"
data = "PasswordAuthentication no\nPermitRootLogin no\nX11Forwarding no\nAllowUsers bastion-operator\n"

# dnf5-automatic: security-only updates, apply immediately, no reboot.
[[customizations.files]]
path = "/etc/dnf/dnf5-plugins/automatic.conf"
mode = "0644"
data = "[commands]\nupgrade_type = security\ndownload_updates = yes\napply_updates = yes\nrandom_sleep = 900\n\n[emitters]\nemit_via = stdio\n"

# cloud-init: restrict to NoCloud + None to avoid hanging on EC2/Azure probes.
[[customizations.files]]
path = "/etc/cloud/cloud.cfg.d/99-bastion-core.cfg"
mode = "0644"
data = "datasource_list: [ NoCloud, None ]\n"

# Scoped NOPASSWD for smoke assertions.
[[customizations.files]]
path = "/etc/sudoers.d/bastion-operator-smoke"
mode = "0440"
data = "bastion-operator ALL=(root) NOPASSWD: /usr/bin/systemctl reboot, /usr/bin/systemctl poweroff, /usr/sbin/poweroff, /usr/sbin/ausearch, /usr/bin/systemctl status *\n"

# Enable nested virt for bastion-qemu: load kvm-amd (or kvm-intel) module at
# boot. The `nested=1` option is already the Fedora default for kvm-amd; this
# file exists as an explicit record and to handle machines where it isn't set.
[[customizations.files]]
path = "/etc/modprobe.d/kvm-nested.conf"
mode = "0644"
data = "options kvm-amd nested=1\noptions kvm-intel nested=1\n"
