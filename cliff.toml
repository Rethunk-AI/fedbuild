# git-cliff config — generates CHANGELOG.md from Conventional Commits.
# Install: brew install git-cliff
# Use:     make changelog        # regenerate CHANGELOG.md
#
# Release flow:
#   make bump-minor            # 0.3.0 → 0.4.0 in spec + blueprint
#   make changelog             # roll unreleased commits into 0.4.0 section
#   git commit -am "chore(release): 0.4.0"
#   git tag v0.4.0

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits -%}
- {{ commit.message | split(pat="\\n") | first | upper_first }}
{% endfor %}
{%- endfor %}

"""

trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat",                                 group = "Added"   },
    { message = "^fix",                                  group = "Fixed"   },
    { message = "^perf",                                 group = "Changed" },
    { message = "^refactor",                             group = "Changed" },
    { message = "^revert",                               group = "Removed" },
    { message = "^docs",                                 group = "Docs"    },
    { message = "^test",                                 group = "Tests"   },
    { message = "^ci",                                   group = "CI"      },
    { message = "^chore\\(release\\)",                   skip  = true      },
    { message = "^chore",                                skip  = true      },
]
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
topo_order = false
sort_commits = "oldest"
